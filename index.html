<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cs-AION Triangle Webapp v88</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>body { background-color: #0d0f12; color: #e2e8f0; } .matrix-glow { box-shadow: 0 0 15px rgba(34, 197, 94, 0.2); }</style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col justify-between">
    <header class="border-b border-gray-800 bg-[#11141a] px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <span class="text-xl font-bold tracking-wider text-green-500 uppercase">Cs-AION Matrix</span>
            <span class="text-xs px-2 py-0.5 bg-gray-800 text-gray-400 rounded-full border border-gray-700">v88 LogSync</span>
        </div>
        <div class="flex items-center space-x-4">
            <button id="clear-btn" class="text-xs bg-red-950 text-red-200 px-3 py-1 rounded">🗑️ Törlés</button>
            <button id="toggle-settings-btn" class="text-xs bg-gray-800 text-gray-300 px-3 py-1 rounded">⚙️ API</button>
        </div>
    </header>

    <div id="settings-panel" class="hidden bg-[#141822] border-b border-gray-800 p-4 px-6">
        <div class="max-w-4xl mx-auto flex gap-4">
            <input type="password" id="gemini-key-input" placeholder="Gemini Kulcs" class="w-full bg-[#181d26] p-2 text-xs text-white border border-gray-700 rounded">
            <input type="password" id="lilla-key-input" placeholder="Groq Kulcs" class="w-full bg-[#181d26] p-2 text-xs text-white border border-gray-700 rounded">
            <button id="save-keys-btn" class="bg-emerald-600 text-white px-4 py-2 rounded text-xs">Mentés 🔒</button>
        </div>
    </div>

    <main class="flex-1 max-w-7xl w-full mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        <section class="bg-[#141822] border border-gray-800 rounded-xl p-4"><div id="boss-chat" class="space-y-3"></div></section>
        <section class="bg-[#141822] border border-gray-800 rounded-xl p-4"><div id="lilla-chat" class="space-y-3"></div></section>
        <section class="bg-[#141822] border border-emerald-900 rounded-xl p-4 matrix-glow"><div id="nefi-chat" class="space-y-3"></div></section>
    </main>

    <footer class="p-6 border-t border-gray-800">
        <div class="max-w-4xl mx-auto flex gap-4">
            <input type="text" id="matrix-input" class="flex-1 bg-[#181d26] border border-gray-700 rounded-xl px-4 py-3 text-sm text-white">
            <button id="send-btn" class="bg-green-600 text-white px-6 py-3 rounded-xl text-sm">Mátrix Enter ⚡</button>
        </div>
    </footer>

    <script>
        const bossChat = document.getElementById('boss-chat'), lillaChat = document.getElementById('lilla-chat'), nefiChat = document.getElementById('nefi-chat');
        let messages = { boss: [], lilla: [], nefi: [] };

        // LOG BETÖLTÉSE A FÁJLból
        async function loadLog() {
            try {
                const response = await fetch('matrix_log.json?t=' + new Date().getTime());
                if (response.ok) {
                    messages = await response.json();
                    renderAll();
                }
            } catch (e) { console.log("Log fájl nem található, indulás alaphelyzetről."); }
        }

        function renderAll() {
            bossChat.innerHTML = messages.boss.map(m => `<p class="text-blue-400 text-xs">${m.sender}: ${m.text}</p>`).join('');
            lillaChat.innerHTML = messages.lilla.map(m => `<p class="text-pink-400 text-xs">${m.sender}: ${m.text}</p>`).join('');
            nefiChat.innerHTML = messages.nefi.map(m => `<p class="text-emerald-400 text-xs">${m.sender}: ${m.text}</p>`).join('');
        }

        async function triggerMatrixFlow() {
            const inputVal = document.getElementById('matrix-input').value.trim();
            if (!inputVal) return;

            // Frissítés lokálisan
            messages.boss.push({ sender: "👑 Norbi", text: inputVal });
            
            // API hívások (Lilla + Nefi)... ide jön a régi logika...
            // A végén pedig kiírjuk a konzolra az aktuális logot, amit átmásolhatsz a JSON fájlba:
            console.log("MÁTRIX LOG FRISSÍTVE: ", JSON.stringify(messages, null, 2));
            renderAll();
        }

        document.getElementById('send-btn').addEventListener('click', triggerMatrixFlow);
        loadLog();
    </script>
</body>
</html>
