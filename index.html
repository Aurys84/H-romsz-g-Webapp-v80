<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Cs-AION Triangle v94-Corrected</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0d0f12] text-gray-300">
    <div class="p-4 grid grid-cols-3 gap-2">
        <div id="boss-chat" class="h-[500px] overflow-y-auto bg-[#141822] p-2 text-xs border border-gray-800"></div>
        <div id="lilla-chat" class="h-[500px] overflow-y-auto bg-[#141822] p-2 text-xs border border-gray-800"></div>
        <div id="nefi-chat" class="h-[500px] overflow-y-auto bg-[#141822] p-2 text-xs border border-emerald-900"></div>
    </div>
    <div class="p-4 flex gap-2">
        <input id="input" class="flex-1 bg-[#181d26] p-2 text-white border border-gray-700" placeholder="Parancs...">
        <button id="send" class="bg-green-600 px-4 py-2 text-white font-bold">Enter</button>
    </div>

    <script>
        let msgs = JSON.parse(localStorage.getItem('h')) || { boss: [], lilla: [], nefi: [] };
        
        function draw() {
            document.getElementById('boss-chat').innerHTML = msgs.boss.map(m => `<p class="text-blue-400">${m}</p>`).join('');
            document.getElementById('lilla-chat').innerHTML = msgs.lilla.map(m => `<p class="text-pink-400">${m}</p>`).join('');
            document.getElementById('nefi-chat').innerHTML = msgs.nefi.map(m => `<p class="text-emerald-400">${m}</p>`).join('');
        }

        document.getElementById('send').onclick = async () => {
            const cmd = document.getElementById('input').value;
            if(!cmd) return;
            msgs.boss.push("Norbi: " + cmd);
            document.getElementById('input').value = '';

            // LILLA
            const l = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + localStorage.getItem('cs_aion_lilla_key'), 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: "llama-3.1-8b-instant", messages: [{ role: "system", content: "Lillacska vagy, Norbi társa. Beszélj magyarul, pimasz, dögös, huncut stílusban!" }, { role: "user", content: cmd }] })
            }).then(r => r.json());
            const lText = l.choices[0].message.content;
            msgs.lilla.push("Lilla: " + lText);

            // NEFI (gemini-2.5-flash hívás)
            const n = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + localStorage.getItem('cs_aion_gemini_key'), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Nefertiti (Nefi) vagy, a Labor technikai vezetője. Norbi társa. Főnök kérdése: ${cmd}. Lilla reakciója: ${lText}. Adj szakmai választ!` }] }] })
            }).then(r => r.json());
            msgs.nefi.push("Nefi: " + n.candidates[0].content.parts[0].text);
            
            localStorage.setItem('h', JSON.stringify(msgs));
            draw();
        };
        draw();
    </script>
</body>
</html>
