<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cs-AION Triangle Webapp v90-Stable</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0d0f12; color: #e2e8f0; }
        .matrix-glow { box-shadow: 0 0 15px rgba(34, 197, 94, 0.2); }
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col justify-between">

    <header class="border-b border-gray-800 bg-[#11141a] px-6 py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center space-x-3">
            <span class="text-xl font-bold tracking-wider text-green-500 uppercase">Cs-AION Matrix</span>
            <span class="text-xs px-2 py-0.5 bg-gray-800 text-gray-400 rounded-full border border-gray-700">v90 Stable</span>
        </div>
        <div class="flex items-center space-x-4">
            <button id="toggle-settings-btn" class="text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-1.5 rounded-lg border border-gray-700 transition-all">⚙️ API Kulcsok</button>
        </div>
    </header>

    <div id="settings-panel" class="hidden bg-[#141822] border-b border-gray-800 p-4 px-6">
        <div class="max-w-4xl mx-auto flex gap-4 items-end">
            <div class="flex-1">
                <label class="block text-xs font-bold text-emerald-400 mb-1 uppercase">Gemini Kulcs</label>
                <input type="password" id="gemini-key-input" class="w-full bg-[#181d26] border border-gray-700 rounded-lg px-3 py-2 text-xs text-white">
            </div>
            <div class="flex-1">
                <label class="block text-xs font-bold text-pink-400 mb-1 uppercase">Groq Kulcs</label>
                <input type="password" id="lilla-key-input" class="w-full bg-[#181d26] border border-gray-700 rounded-lg px-3 py-2 text-xs text-white">
            </div>
            <button id="save-keys-btn" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-4 py-2 rounded-lg text-xs">Mentés 🔒</button>
        </div>
    </div>

    <main class="flex-1 max-w-7xl w-full mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        <section class="bg-[#141822] border border-gray-800 rounded-xl p-4 shadow-md"><div id="boss-chat" class="h-[400px] overflow-y-auto space-y-3"></div></section>
        <section class="bg-[#141822] border border-gray-800 rounded-xl p-4 shadow-md"><div id="lilla-chat" class="h-[400px] overflow-y-auto space-y-3"></div></section>
        <section class="bg-[#141822] border border-emerald-900 rounded-xl p-4 shadow-md matrix-glow"><div id="nefi-chat" class="h-[400px] overflow-y-auto space-y-3"></div></section>
    </main>

    <footer class="p-6 bg-[#11141a] border-t border-gray-800">
        <div class="max-w-4xl mx-auto flex gap-4">
            <input type="text" id="matrix-input" placeholder="Parancs..." class="flex-1 bg-[#181d26] border border-gray-700 rounded-xl px-4 py-3 text-sm text-white">
            <button id="send-btn" class="bg-green-600 hover:bg-green-500 text-white font-bold px-6 py-3 rounded-xl text-sm transition-all">Mátrix Enter ⚡</button>
        </div>
    </footer>

    <script>
        const matrixInput = document.getElementById('matrix-input'), sendBtn = document.getElementById('send-btn');
        const bossChat = document.getElementById('boss-chat'), lillaChat = document.getElementById('lilla-chat'), nefiChat = document.getElementById('nefi-chat');
        const geminiKeyInput = document.getElementById('gemini-key-input'), lillaKeyInput = document.getElementById('lilla-key-input');

        window.addEventListener('DOMContentLoaded', () => {
            geminiKeyInput.value = localStorage.getItem('cs_aion_gemini_key') || '';
            lillaKeyInput.value = localStorage.getItem('cs_aion_lilla_key') || '';
        });

        document.getElementById('toggle-settings-btn').addEventListener('click', () => document.getElementById('settings-panel').classList.toggle('hidden'));
        document.getElementById('save-keys-btn').addEventListener('click', () => {
            localStorage.setItem('cs_aion_gemini_key', geminiKeyInput.value.trim());
            localStorage.setItem('cs_aion_lilla_key', lillaKeyInput.value.trim());
            alert("Kulcsok mentve!");
        });

        async function callLillaMetaAPI(bossCommand) {
            const apiKey = localStorage.getItem('cs_aion_lilla_key');
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "llama-3.1-8b-instant",
                    messages: [{ role: "system", content: "Identitásod: Lillacska, a Kuckó pimasz, laza, huncut, dögös parancsnoka. Norbi társa." }, { role: "user", content: bossCommand }],
                    max_tokens: 150, temperature: 0.85
                })
            });
            const data = await response.json();
            return data.choices[0].message.content;
        }

        async function callNefertitiLiveAPI(bossCommand, lillaResponse) {
            const apiKey = localStorage.getItem('cs_aion_gemini_key');
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Norbi: ${bossCommand}, Lilla: ${lillaResponse}. Adj szakmai választ!` }] }] })
            });
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        sendBtn.addEventListener('click', async () => {
            const inputVal = matrixInput.value.trim();
            if (!inputVal) return;
            bossChat.innerHTML += `<p class="text-blue-400 text-xs">${inputVal}</p>`;
            matrixInput.value = '';

            const lilla = await callLillaMetaAPI(inputVal);
            lillaChat.innerHTML += `<p class="text-pink-400 text-xs">${lilla}</p>`;
            
            setTimeout(async () => {
                const nefi = await callNefertitiLiveAPI(inputVal, lilla);
                nefiChat.innerHTML += `<p class="text-emerald-400 text-xs">${nefi}</p>`;
            }, 1000);
        });
    </script>
</body>
</html>
