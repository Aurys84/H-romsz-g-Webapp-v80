<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Cs-AION Triangle v90-Stable</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#0d0f12] text-gray-300 min-h-screen flex flex-col">

    <header class="p-4 border-b border-gray-800 flex justify-between items-center bg-[#11141a]">
        <h1 class="text-green-500 font-bold tracking-widest">Cs-AION v90-Stable</h1>
        <button id="toggle-settings-btn" class="bg-gray-800 px-3 py-1 rounded text-xs">⚙️ API Kulcsok</button>
    </header>

    <div id="settings-panel" class="hidden p-4 bg-[#141822] border-b border-gray-800">
        <div class="max-w-4xl mx-auto flex gap-4">
            <input type="password" id="gemini-key-input" placeholder="Gemini Kulcs" class="bg-[#181d26] p-2 rounded text-xs flex-1 text-white border border-gray-700">
            <input type="password" id="lilla-key-input" placeholder="Groq Kulcs" class="bg-[#181d26] p-2 rounded text-xs flex-1 text-white border border-gray-700">
            <button id="save-keys-btn" class="bg-emerald-600 px-4 py-2 rounded text-xs">Mentés 🔒</button>
        </div>
    </div>

    <main class="flex-1 p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div id="boss-chat" class="bg-[#141822] p-4 rounded-xl border border-gray-800 h-[400px] overflow-y-auto"></div>
        <div id="lilla-chat" class="bg-[#141822] p-4 rounded-xl border border-gray-800 h-[400px] overflow-y-auto"></div>
        <div id="nefi-chat" class="bg-[#141822] p-4 rounded-xl border border-emerald-900 h-[400px] overflow-y-auto"></div>
    </main>

    <footer class="p-6 border-t border-gray-800">
        <div class="max-w-4xl mx-auto flex gap-4">
            <input type="text" id="matrix-input" class="flex-1 bg-[#181d26] p-3 rounded-xl border border-gray-700 text-white" placeholder="Parancs, Főnök...">
            <button id="send-btn" class="bg-green-600 px-6 py-3 rounded-xl text-white">Mátrix Enter ⚡</button>
        </div>
    </footer>

    <script>
        // Kulcsok mentése / betöltése
        document.getElementById('save-keys-btn').addEventListener('click', () => {
            localStorage.setItem('cs_aion_gemini_key', document.getElementById('gemini-key-input').value);
            localStorage.setItem('cs_aion_lilla_key', document.getElementById('lilla-key-input').value);
            alert("Kulcsok mentve!");
        });

        document.getElementById('toggle-settings-btn').addEventListener('click', () => {
            document.getElementById('settings-panel').classList.toggle('hidden');
        });

        // Betöltés
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('gemini-key-input').value = localStorage.getItem('cs_aion_gemini_key') || '';
            document.getElementById('lilla-key-input').value = localStorage.getItem('cs_aion_lilla_key') || '';
        });

        // API Hívások (itt a tiszta logika)
        async function triggerMatrixFlow() {
            const input = document.getElementById('matrix-input').value;
            if(!input) return;
            
            // Kiírjuk a Főnököt
            document.getElementById('boss-chat').innerHTML += `<p class="text-blue-400 text-sm mb-2">${input}</p>`;
            document.getElementById('matrix-input').value = '';

            // Itt jönnének az API hívások (tiszta formában)...
            // ...
        }
        document.getElementById('send-btn').addEventListener('click', triggerMatrixFlow);
    </script>
</body>
</html>
