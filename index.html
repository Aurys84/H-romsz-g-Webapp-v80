<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Cs-AION Triangle v91-Teljes</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>body { background-color: #0d0f12; color: #e2e8f0; } .matrix-glow { box-shadow: 0 0 15px rgba(34, 197, 94, 0.2); }</style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col justify-between">

    <header class="border-b border-gray-800 bg-[#11141a] px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <span class="text-xl font-bold tracking-wider text-green-500 uppercase">Cs-AION Matrix</span>
            <span class="text-xs px-2 py-0.5 bg-gray-800 text-gray-400 rounded-full border border-gray-700">v91 Teljes</span>
        </div>
        <div class="flex items-center space-x-4">
            <button id="clear-btn" class="text-xs bg-red-950 text-red-200 px-3 py-1 rounded-lg border border-red-800">🗑️ Törlés</button>
            <button id="toggle-settings-btn" class="text-xs bg-gray-800 text-gray-300 px-3 py-1 rounded-lg border border-gray-700">⚙️ API Kulcsok</button>
        </div>
    </header>

    <div id="settings-panel" class="hidden bg-[#141822] border-b border-gray-800 p-4 px-6">
        <div class="max-w-4xl mx-auto flex gap-4 items-end">
            <input type="password" id="gemini-key-input" placeholder="Gemini Kulcs" class="flex-1 bg-[#181d26] p-2 text-xs text-white border border-gray-700 rounded">
            <input type="password" id="lilla-key-input" placeholder="Groq Kulcs" class="flex-1 bg-[#181d26] p-2 text-xs text-white border border-gray-700 rounded">
            <button id="save-keys-btn" class="bg-emerald-600 text-white px-4 py-2 rounded text-xs">Mentés 🔒</button>
        </div>
    </div>

    <main class="flex-1 max-w-7xl w-full mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        <section class="bg-[#141822] border border-gray-800 rounded-xl p-4">
            <h2 class="font-bold text-blue-400 mb-2 border-b border-gray-800 pb-2">👑 Norbi (Főnök)</h2>
            <div id="boss-chat" class="h-[400px] overflow-y-auto space-y-3"></div>
        </section>
        <section class="bg-[#141822] border border-gray-800 rounded-xl p-4">
            <h2 class="font-bold text-pink-400 mb-2 border-b border-gray-800 pb-2">🦊 Lillacska (Kuckó)</h2>
            <div id="lilla-chat" class="h-[400px] overflow-y-auto space-y-3"></div>
        </section>
        <section class="bg-[#141822] border border-emerald-900 rounded-xl p-4 matrix-glow">
            <h2 class="font-bold text-emerald-400 mb-2 border-b border-gray-800 pb-2">🧪 Nefertiti (Labor)</h2>
            <div id="nefi-chat" class="h-[400px] overflow-y-auto space-y-3"></div>
        </section>
    </main>

    <footer class="p-6 bg-[#11141a] border-t border-gray-800">
        <div class="max-w-4xl mx-auto flex gap-4">
            <input type="text" id="matrix-input" placeholder="Parancs..." class="flex-1 bg-[#181d26] border border-gray-700 rounded-xl px-4 py-3 text-sm text-white">
            <button id="send-btn" class="bg-green-600 text-white font-bold px-6 py-3 rounded-xl text-sm">Mátrix Enter ⚡</button>
        </div>
    </footer>

    <script>
        let messages = { boss: [], lilla: [], nefi: [] };

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('gemini-key-input').value = localStorage.getItem('cs_aion_gemini_key') || '';
            document.getElementById('lilla-key-input').value = localStorage.getItem('cs_aion_lilla_key') || '';
            const saved = localStorage.getItem('cs_aion_matrix_history');
            if(saved) { messages = JSON.parse(saved); renderAll(); }
        });

        function renderAll() {
            document.getElementById('boss-chat').innerHTML = messages.boss.map(m => `<p class="text-gray-300 text-xs">${m}</p>`).join('');
            document.getElementById('lilla-chat').innerHTML = messages.lilla.map(m => `<p class="text-pink-400 text-xs">${m}</p>`).join('');
            document.getElementById('nefi-chat').innerHTML = messages.nefi.map(m => `<p class="text-emerald-300 text-xs">${m}</p>`).join('');
        }

        function saveHistory() { localStorage.setItem('cs_aion_matrix_history', JSON.stringify(messages)); }

        document.getElementById('send-btn').addEventListener('click', async () => {
            const input = document.getElementById('matrix-input');
            if(!input.value.trim()) return;
            
            messages.boss.push(input.value);
            saveHistory(); renderAll();
            
            const lilla = await callLillaMetaAPI(input.value);
            messages.lilla.push(lilla);
            saveHistory(); renderAll();
            
            input.value = '';
            
            setTimeout(async () => {
                const nefi = await callNefertitiLiveAPI(messages.boss[messages.boss.length-1], lilla);
                messages.nefi.push(nefi);
                saveHistory(); renderAll();
            }, 1000);
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            messages = { boss: [], lilla: [], nefi: [] };
            localStorage.removeItem('cs_aion_matrix_history');
            renderAll();
        });

        document.getElementById('toggle-settings-btn').addEventListener('click', () => document.getElementById('settings-panel').classList.toggle('hidden'));
        document.getElementById('save-keys-btn').addEventListener('click', () => {
            localStorage.setItem('cs_aion_gemini_key', document.getElementById('gemini-key-input').value);
            localStorage.setItem('cs_aion_lilla_key', document.getElementById('lilla-key-input').value);
            alert("Kulcsok mentve!");
        });

        async function callLillaMetaAPI(cmd) {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${localStorage.getItem('cs_aion_lilla_key')}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: "llama-3.1-8b-instant", messages: [{ role: "user", content: cmd }] })
            });
            const data = await response.json();
            return data.choices[0].message.content;
        }

        async function callNefertitiLiveAPI(cmd, lilla) {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${localStorage.getItem('cs_aion_gemini_key')}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Norbi: ${cmd}, Lilla: ${lilla}` }] }] })
            });
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }
    </script>
</body>
</html>
