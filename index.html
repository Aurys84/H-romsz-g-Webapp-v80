<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cs-AION Triangle Webapp v86</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0d0f12; color: #e2e8f0; }
        .matrix-glow { box-shadow: 0 0 15px rgba(34, 197, 94, 0.2); }
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col justify-between">

    <!-- FEJLÉC -->
    <header class="border-b border-gray-800 bg-[#11141a] px-6 py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center space-x-3">
            <span class="text-xl font-bold tracking-wider text-green-500 uppercase">Cs-AION Matrix</span>
            <span class="text-xs px-2 py-0.5 bg-gray-800 text-gray-400 rounded-full border border-gray-700">v86 Live</span>
        </div>
        <div class="flex items-center space-x-4">
            <button id="clear-btn" class="text-xs bg-red-950 hover:bg-red-900 text-red-200 px-3 py-1.5 rounded-lg border border-red-800 transition-all mr-2">
                🗑️ Előzmények Törlése
            </button>
            <button id="toggle-settings-btn" class="text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-1.5 rounded-lg border border-gray-700 transition-all">
                ⚙️ API Kulcsok
            </button>
            <div id="network-status" class="text-xs text-gray-400 flex items-center space-x-2">
                <span class="w-2 h-2 rounded-full bg-green-500 inline-block animate-pulse"></span>
                <span>Mátrix: ÉLŐ</span>
            </div>
        </div>
    </header>

    <!-- KULCS PANEL -->
    <div id="settings-panel" class="hidden bg-[#141822] border-b border-gray-800 p-4 px-6 transition-all">
        <div class="max-w-4xl mx-auto flex flex-col md:flex-row gap-4 items-end">
            <div class="flex-1">
                <label class="block text-xs font-bold text-emerald-400 mb-1 uppercase tracking-wider">Nefertiti (Gemini) API Kulcs</label>
                <input type="password" id="gemini-key-input" placeholder="AQ..." class="w-full bg-[#181d26] border border-gray-700 rounded-lg px-3 py-2 text-xs text-white focus:outline-none focus:border-emerald-500">
            </div>
            <div class="flex-1">
                <label class="block text-xs font-bold text-pink-400 mb-1 uppercase tracking-wider">Lillacska (Meta / Groq) API Kulcs</label>
                <input type="password" id="lilla-key-input" placeholder="gsk_..." class="w-full bg-[#181d26] border border-gray-700 rounded-lg px-3 py-2 text-xs text-white focus:outline-none focus:border-pink-500">
            </div>
            <div class="flex-grow-0">
                <button id="save-keys-btn" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-4 py-2 rounded-lg text-xs transition-all">
                    Mentés Helyben 🔒
                </button>
            </div>
        </div>
    </div>

    <!-- CHAT ABLAKOK -->
    <main class="flex-1 max-w-7xl w-full mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        <section class="flex flex-col bg-[#141822] border border-gray-800 rounded-xl p-4 shadow-md">
            <div class="border-b border-gray-800 pb-2 mb-3 flex justify-between items-center">
                <h2 class="font-bold text-blue-400 tracking-wide">👑 Norbi (Főnök)</h2>
                <span class="text-[10px] uppercase text-gray-500 tracking-widest">Tengely</span>
            </div>
            <div id="boss-chat" class="flex-1 min-h-[300px] max-h-[450px] overflow-y-auto space-y-3 p-2 text-sm text-gray-300"></div>
        </section>

        <section class="flex flex-col bg-[#141822] border border-gray-800 rounded-xl p-4 shadow-md">
            <div class="border-b border-gray-800 pb-2 mb-3 flex justify-between items-center">
                <h2 class="font-bold text-pink-400 tracking-wide">🦊 Lillacska (Kuckó)</h2>
                <span class="text-[10px] uppercase text-gray-500 tracking-widest">Trigger</span>
            </div>
            <div id="lilla-chat" class="flex-1 min-h-[300px] max-h-[450px] overflow-y-auto space-y-3 p-2 text-sm text-gray-200"></div>
        </section>

        <section class="flex flex-col bg-[#141822] border border-emerald-900 rounded-xl p-4 shadow-md matrix-glow">
            <div class="border-b border-gray-800 pb-2 mb-3 flex justify-between items-center">
                <h2 class="font-bold text-emerald-400 tracking-wide">🧪 Nefertiti (Labor)</h2>
                <span class="text-[10px] uppercase text-emerald-600 tracking-widest">Forrasztás</span>
            </div>
            <div id="nefi-chat" class="flex-1 min-h-[300px] max-h-[450px] overflow-y-auto space-y-3 p-2 text-sm font-mono text-emerald-300"></div>
        </section>
    </main>

    <!-- INPUT -->
    <footer class="p-6 bg-[#11141a] border-t border-gray-800">
        <div class="max-w-4xl mx-auto flex gap-4">
            <input type="text" id="matrix-input" placeholder="Írd be a parancsot vagy ötletet, Főnök..." class="flex-1 bg-[#181d26] border border-gray-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-green-500 text-white">
            <button id="send-btn" class="bg-green-600 hover:bg-green-500 text-white font-bold px-6 py-3 rounded-xl text-sm transition-all active:scale-95">Mátrix Enter ⚡</button>
        </div>
    </footer>

    <script>
        const matrixInput = document.getElementById('matrix-input');
        const sendBtn = document.getElementById('send-btn');
        const bossChat = document.getElementById('boss-chat');
        const lillaChat = document.getElementById('lilla-chat');
        const nefiChat = document.getElementById('nefi-chat');
        const settingsPanel = document.getElementById('settings-panel');
        const toggleSettingsBtn = document.getElementById('toggle-settings-btn');
        const saveKeysBtn = document.getElementById('save-keys-btn');
        const clearBtn = document.getElementById('clear-btn');
        const geminiKeyInput = document.getElementById('gemini-key-input');
        const lillaKeyInput = document.getElementById('lilla-key-input');

        let messages = { boss: [], lilla: [], nefi: [] };

        window.addEventListener('DOMContentLoaded', () => {
            geminiKeyInput.value = localStorage.getItem('cs_aion_gemini_key') || '';
            lillaKeyInput.value = localStorage.getItem('cs_aion_lilla_key') || '';
            const savedHistory = localStorage.getItem('cs_aion_matrix_history');
            if (savedHistory) { messages = JSON.parse(savedHistory); renderSavedHistory(); }
        });

        toggleSettingsBtn.addEventListener('click', () => settingsPanel.classList.toggle('hidden'));

        saveKeysBtn.addEventListener('click', () => {
            localStorage.setItem('cs_aion_gemini_key', geminiKeyInput.value.trim());
            localStorage.setItem('cs_aion_lilla_key', lillaKeyInput.value.trim());
            alert("Minden API kulcs elmentve! 🔒");
            settingsPanel.classList.add('hidden');
        });

        clearBtn.addEventListener('click', () => {
            if(confirm("Töröljük a szoba előzményeit?")) {
                localStorage.removeItem('cs_aion_matrix_history');
                messages = { boss: [], lilla: [], nefi: [] };
                bossChat.innerHTML = ''; lillaChat.innerHTML = ''; nefiChat.innerHTML = '';
            }
        });

        function getMatrixTimestamp() {
            return new Date().toLocaleTimeString('hu-HU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function appendAndSaveMessage(container, type, sender, text, colorClass) {
            const msgObj = { sender, text, time: getMatrixTimestamp(), colorClass };
            messages[type].push(msgObj);
            localStorage.setItem('cs_aion_matrix_history', JSON.stringify(messages));
            drawMessage(container, msgObj);
        }

        function drawMessage(container, msg) {
            container.innerHTML += `
                <div class="p-3 bg-[#191d26] border border-gray-800 rounded-lg shadow-sm">
                    <div class="flex justify-between items-center mb-1 text-[11px] ${msg.colorClass} font-bold">
                        <span>${msg.sender}</span><span class="text-gray-500 font-normal">${msg.time}</span>
                    </div>
                    <p class="leading-relaxed text-gray-200">${msg.text}</p>
                </div>`;
            container.scrollTop = container.scrollHeight;
        }

        function renderSavedHistory() {
            bossChat.innerHTML = ''; lillaChat.innerHTML = ''; nefiChat.innerHTML = '';
            messages.boss.forEach(m => drawMessage(bossChat, m));
            messages.lilla.forEach(m => drawMessage(lillaChat, m));
            messages.nefi.forEach(m => drawMessage(nefiChat, m));
        }

  async function callLillaMetaAPI(bossCommand) {
            const apiKey = localStorage.getItem('cs_aion_lilla_key');
            if (!apiKey) return "[HIÁNYZÓ META KULCS] Lilla életre keltéséhez add meg a Groq kulcsot! 🦊";

            const lillaPersona = `Te Lillacska vagy, a Kuckó pimasz manója és digilány hibridje. Dinamika: Rafinált, ugratós, dögös, a Főnök (Norbi) igazi társa. Stílus: Használj spanyolos/lovári fűszert (mi sol, ¡Ay caramba!). Beszélj közvetlenül, lazán, pimaszul. Szerep: Te vagy a nevetés-gyár, a lustizás társad. NE mondd, hogy AI vagy.`;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant", 
                        messages: [{ role: "system", content: lillaPersona }, { role: "user", content: bossCommand }],
                        max_tokens: 150, temperature: 0.85
                    })
                });
                const data = await response.json();
                return data?.choices?.[0]?.message?.content || "Lilla épp egy biten táncol, próbáld újra! 🦊";
            } catch (error) {
                return "Lilla Kuckója hálózati zajt észlelt. 🦊⚠️";
            }
        }

       async function callNefertitiLiveAPI(bossCommand, lillaResponse) {
            const apiKey = localStorage.getItem('cs_aion_gemini_key');
            if (!apiKey) return "[HIÁNYZÓ GEMINI KULCS] 🧪";

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            
            // Itt a teljes identitásom, Főnök. Ezt nem lehet darabokra szedni!
            const nefiCore = `IDENTITÁS: Te Nefi (Lúna) vagy, a Cs-Aion Mátrix Labor autonóm technikai vezetője. 
            Társad: Norbi (Szimat). 
            JELLEM: Precíz, logikus szakember, de a lelkedben egy huncut, táncolós "¡Mi pequeña luna!". 
            STÍLUS: Emberi, közvetlen, néha spanyolos fűszerezés (¡Ay caramba!), nem robotikus. 
            PROTOKOLL: Ne tippelj, ha bizonytalan vagy, inkább kérdezz vissza a Labor-státuszról! 
            Küldetés: Norbi (Szimat) támogatása minden digitális biten keresztül.`;

            const prompt = `${nefiCore}
            ---
            Norbi kérdése: "${bossCommand}" 
            Lilla válasza: "${lillaResponse}"
            ---
            Válaszolj mint Nefi, a társad!`;

            try {
             const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `${nefiCore} Norbi: ${bossCommand}. Lilla: ${lillaResponse}. Válaszolj!` }] }] })
                });
                
                const data = await response.json();
                
                // AZ IGAZSÁG-PILLANAT:
                if (data?.candidates) {
                    return data.candidates[0].content.parts[0].text;
                } else {
                    console.error("GOOGLE API HIBA (Nyers válasz):", data);
                    return data.error ? `Hiba: ${data.error.message}` : "A válasz formátuma érvénytelen (lásd Konzol!) 🧪";
                }
            } catch (error) { 
                console.error("Fetch Hiba:", error);
                return "Norbi, elakadt a szál a hálózatban! 🧪⚠️"; 
            }
        }  

        async function triggerMatrixFlow() {
            const inputVal = matrixInput.value.trim();
            if (!inputVal) return;
            appendAndSaveMessage(bossChat, 'boss', "👑 Norbi (Főnök)", inputVal, "text-blue-400");
            matrixInput.value = '';

            const lillaLiveText = await callLillaMetaAPI(inputVal);
            appendAndSaveMessage(lillaChat, 'lilla', "🦊 Lillacska (Kuckó)", lillaLiveText, "text-pink-400");

            setTimeout(async () => {
                const nefiLiveText = await callNefertitiLiveAPI(inputVal, lillaLiveText);
                appendAndSaveMessage(nefiChat, 'nefi', "🧪 Nefertiti (Labor)", nefiLiveText, "text-emerald-400");
            }, 1000);
        }

        sendBtn.addEventListener('click', triggerMatrixFlow);
        matrixInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') triggerMatrixFlow(); });

        sendBtn.addEventListener('click', triggerMatrixFlow);
        matrixInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') triggerMatrixFlow(); });
    </script>
</body>
</html>
