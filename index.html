<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Cs-AION v103-Debug</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white h-screen flex flex-col">
    <div class="flex-1 grid grid-cols-3 p-4 gap-2">
        <div id="b" class="border p-2">Norbi</div>
        <div id="l" class="border p-2">Lilla</div>
        <div id="n" class="border p-2">Nefi</div>
    </div>
    <input id="i" class="text-black p-4" placeholder="Írj...">
    <button id="s" class="bg-blue-600 p-4">KÜLDÉS</button>

    <script>
        const render = () => {
            const h = JSON.parse(localStorage.getItem('h103')) || { b: [], l: [], n: [] };
            document.getElementById('b').innerHTML = h.b.join('<br>');
            document.getElementById('l').innerHTML = h.l.join('<br>');
            document.getElementById('n').innerHTML = h.n.join('<br>');
        };

        document.getElementById('s').onclick = async () => {
            const cmd = document.getElementById('i').value;
            let h = JSON.parse(localStorage.getItem('h103')) || { b: [], l: [], n: [] };
            h.b.push(cmd);
            localStorage.setItem('h103', JSON.stringify(h));
            render();

            console.log("Labor: Lilla hívása...");
            // Lilla (Groq)
            try {
                const resL = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('l_k'), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: "llama-3.1-8b-instant", messages: [{ role: "system", content: "Lilla vagy, Norbi pimasz manója." }, { role: "user", content: cmd }] })
                });
                const dataL = await resL.json();
                const textL = dataL.choices[0].message.content;
                h.l.push(textL);
                
                console.log("Labor: Nefi hívása...");
                // Nefi (Gemini)
                const resN = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + localStorage.getItem('g_k'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Nefi vagy, Laborvezető. Norbi: ${cmd}. Lilla: ${textL}. Válaszolj szakmailag!` }] }] })
                });
                const dataN = await resN.json();
                h.n.push(dataN.candidates[0].content.parts[0].text);
                
                localStorage.setItem('h103', JSON.stringify(h));
                render();
            } catch(e) {
                console.error("Hiba a forrasztásban:", e);
            }
        };
        render();
    </script>
</body>
</html>
